<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>איקס עיגול - שחק מול המחשב</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f172a, #1e1b4b);
      color: #f8fafc;
    }

    .game-box {
      width: min(90vw, 540px);
      background: rgba(15, 23, 42, 0.92);
      border: 1px solid rgba(148, 163, 184, 0.3);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 25px 60px rgba(15, 23, 42, 0.45);
    }

    h1 {
      margin: 0 0 12px;
      text-align: center;
      font-size: clamp(1.6rem, 2vw, 2rem);
    }

    .subtitle {
      text-align: center;
      color: #cbd5e1;
      margin-bottom: 18px;
    }

    .status {
      text-align: center;
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 18px;
      min-height: 1.5rem;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 0 auto 16px;
      width: min(100%, 420px);
    }

    .cell {
      aspect-ratio: 1;
      border: 0;
      border-radius: 18px;
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 800;
      background: linear-gradient(180deg, #1e293b, #334155);
      color: #f8fafc;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease;
      box-shadow: inset 0 -6px 0 rgba(30, 41, 59, 0.75);
    }

    .cell:hover:not(:disabled) {
      transform: translateY(-2px);
      background: linear-gradient(180deg, #334155, #475569);
    }

    .cell:disabled {
      cursor: not-allowed;
      opacity: 0.95;
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }

    #restartBtn {
      background: #22c55e;
      color: #052e16;
    }

    #newRoundBtn {
      background: #38bdf8;
      color: #082f49;
    }

    .legend {
      margin-top: 18px;
      text-align: center;
      color: #cbd5e1;
      font-size: 0.95rem;
    }

    @media (max-width: 600px) {
      .game-box {
        padding: 18px;
        border-radius: 20px;
      }

      .board {
        gap: 8px;
      }

      .cell {
        border-radius: 14px;
      }
    }
  </style>
</head>
<body>
  <main class="game-box">
    <h1>איקס עיגול</h1>
    <p class="subtitle">אתה משחק כ־X והמחשב כ־O</p>
    <div id="status" class="status">בתור שלך להתחיל</div>

    <div id="board" class="board" aria-label="לוח משחק איקס עיגול"></div>

    <div class="actions">
      <button id="newRoundBtn" type="button">סיבוב חדש</button>
      <button id="restartBtn" type="button">התחל מחדש</button>
    </div>

    <p class="legend">התוצאה: ניצחון, תיקו או ... מחשב חכם ומנסה למנוע הפסד.</p>
  </main>

  <script>
    const board = document.getElementById('board');
    const status = document.getElementById('status');
    const newRoundBtn = document.getElementById('newRoundBtn');
    const restartBtn = document.getElementById('restartBtn');

    const WINNING_LINES = [
      [0, 1, 2], [3, 4, 5], [6, 7, 8],
      [0, 3, 6], [1, 4, 7], [2, 5, 8],
      [0, 4, 8], [2, 4, 6]
    ];

    let gameState = Array(9).fill('');
    let currentPlayer = 'X';
    let gameOver = false;

    function renderBoard() {
      board.innerHTML = '';

      gameState.forEach((cell, index) => {
        const button = document.createElement('button');
        button.className = 'cell';
        button.type = 'button';
        button.disabled = !!cell || gameOver;
        button.textContent = cell;
        button.setAttribute('aria-label', `משבצת ${index + 1}`);
        button.addEventListener('click', () => handlePlayerMove(index));
        board.appendChild(button);
      });
    }

    function updateStatus(text) {
      status.textContent = text;
    }

    function checkWinner(state) {
      for (const [a, b, c] of WINNING_LINES) {
        if (state[a] && state[a] === state[b] && state[a] === state[c]) {
          return state[a];
        }
      }
      return null;
    }

    function isBoardFull(state) {
      return state.every((cell) => cell !== '');
    }

    function finishGame(winner) {
      gameOver = true;
      if (winner === 'X') {
        updateStatus('ניצחת! 🎉');
      } else if (winner === 'O') {
        updateStatus('המחשב ניצח 😅');
      } else {
        updateStatus('תיקו! שווה משחק.');
      }
      renderBoard();
    }

    function evaluateMove(state, player) {
      const winner = checkWinner(state);
      if (winner === player) return 10;
      if (winner && winner !== player) return -10;
      if (isBoardFull(state)) return 0;
      return null;
    }

    function minimax(state, depth, isMaximizing) {
      const score = evaluateMove(state, 'O');
      const oppScore = evaluateMove(state, 'X');

      if (score !== null) {
        return score - depth;
      }

      if (oppScore !== null) {
        return oppScore + depth;
      }

      if (isMaximizing) {
        let bestScore = -Infinity;
        for (let i = 0; i < state.length; i++) {
          if (!state[i]) {
            state[i] = 'O';
            const currentScore = minimax(state, depth + 1, false);
            state[i] = '';
            bestScore = Math.max(bestScore, currentScore);
          }
        }
        return bestScore;
      }

      let bestScore = Infinity;
      for (let i = 0; i < state.length; i++) {
        if (!state[i]) {
          state[i] = 'X';
          const currentScore = minimax(state, depth + 1, true);
          state[i] = '';
          bestScore = Math.min(bestScore, currentScore);
        }
      }
      return bestScore;
    }

    function getComputerMove() {
      const winningMove = getImmediateMove('O');
      if (winningMove !== null) return winningMove;

      const blockMove = getImmediateMove('X');
      if (blockMove !== null) return blockMove;

      if (!gameState[4]) return 4;

      const corners = [0, 2, 6, 8].filter((i) => !gameState[i]);
      if (corners.length) {
        return corners[Math.floor(Math.random() * corners.length)];
      }

      const edges = [1, 3, 5, 7].filter((i) => !gameState[i]);
      if (edges.length) {
        return edges[Math.floor(Math.random() * edges.length)];
      }

      return null;
    }

    function getImmediateMove(player) {
      for (let i = 0; i < gameState.length; i++) {
        if (!gameState[i]) {
          gameState[i] = player;
          const winner = checkWinner(gameState);
          gameState[i] = '';
          if (winner === player) return i;
        }
      }
      return null;
    }

    function computerTurn() {
      if (gameOver) return;

      const move = getComputerMove();
      if (move === null) {
        finishGame(null);
        return;
      }

      gameState[move] = 'O';
      currentPlayer = 'X';
      const winner = checkWinner(gameState);

      if (winner) {
        finishGame(winner);
      } else if (isBoardFull(gameState)) {
        finishGame(null);
      } else {
        updateStatus('בתור שלך');
        renderBoard();
      }
    }

    function handlePlayerMove(index) {
      if (gameOver || gameState[index] || currentPlayer !== 'X') return;

      gameState[index] = 'X';
      const winner = checkWinner(gameState);

      if (winner) {
        finishGame(winner);
        return;
      }

      if (isBoardFull(gameState)) {
        finishGame(null);
        return;
      }

      currentPlayer = 'O';
      updateStatus('המחשב חושב...');
      renderBoard();

      setTimeout(() => {
        computerTurn();
      }, 450);
    }

    function resetGame() {
      gameState = Array(9).fill('');
      currentPlayer = 'X';
      gameOver = false;
      updateStatus('בתור שלך להתחיל');
      renderBoard();
    }

    newRoundBtn.addEventListener('click', resetGame);
    restartBtn.addEventListener('click', resetGame);

    renderBoard();
  </script>
</body>
</html>
